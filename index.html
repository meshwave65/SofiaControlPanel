<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0e141d">
  <link rel="manifest" href="/manifest.json">
  <title>Sofia Control Panel</title>
  
  <style>
    :root {
      --bg: #0a0f19;
      --card: #0e141d;
      --accent: #4ea1ff;
      --text: #cfd6e4;
      --text-muted: #8aa0b5;
      --border: #1f2a3a;
      --success: #22c55e;
      --warning: #eab308;
      --danger: #ef4444;
      --staged: #4ea1ff;
      --respondida: #a855f7;
    }
    
    * { box-sizing: border-box; margin:0; padding:0; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      padding-bottom: 90px;
      line-height: 1.5;
    }
    
    nav {
      background: var(--card);
      padding: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.5px; }

    .container { max-width: 600px; margin: 0 auto; }

    .tab { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
    .tab.active { display: block; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card);
      display: flex;
      justify-content: space-around;
      padding: 12px 0 10px;
      border-top: 1px solid var(--border);
      z-index: 200;
      backdrop-filter: blur(10px);
    }
    
    .nav-item {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: color 0.2s;
      flex: 1;
    }
    
    .nav-item.active { color: var(--accent); }
    
    .nav-icon {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .task-card {
      background: var(--card);
      margin-bottom: 16px;
      padding: 18px;
      border-radius: 16px;
      border: 1px solid var(--border);
      transition: transform 0.2s;
    }
    
    .task-card:active { transform: scale(0.98); }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    
    .card-title { font-weight: 600; font-size: 15px; color: #fff; }
    
    .status-badge {
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }
    
    .status-paused { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
    .status-progress { background: rgba(234, 179, 8, 0.15); color: var(--warning); }
    .status-done { background: rgba(34, 197, 94, 0.15); color: var(--success); }
    .status-respondida { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
    .status-staged { background: rgba(78, 161, 255, 0.15); color: var(--accent); }
    .status-fail { background: rgba(0, 0, 0, 0.4); color: #ff4444; border: 1px solid #ff4444; }
    
    .card-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
    
    .card-content {
      background: rgba(255,255,255,0.03);
      padding: 14px;
      border-radius: 12px;
      font-size: 14px;
      border-left: 3px solid var(--accent);
      white-space: pre-wrap;
    }

    textarea {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      resize: none;
      margin-bottom: 20px;
    }
    
    textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }

    .btn-primary {
      width: 100%;
      padding: 18px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .btn-primary:active { opacity: 0.8; }

    .agent-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--card);
      border-radius: 12px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
    }
    
    .agent-avatar {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-weight: bold;
    }

    .loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 15, 25, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      display: none;
    }
    .loading-overlay.active { display: flex; }

    .subtask-indicator {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 8px;
      display: block;
    }
  </style>
</head>
<body>

<div id="loading" class="loading-overlay">
  <div style="color: var(--accent); font-weight: bold;">Carregando...</div>
</div>

<nav>
  <h1>SOFIA CONTROL</h1>
</nav>

<div class="container">
  <!-- DASHBOARD -->
  <div class="tab active" id="dashboard-tab">
    <div class="section-title">
      <span>🚀 Missões Ativas</span>
      <span style="font-size: 14px; color: var(--accent); cursor: pointer;" onclick="app.fetchData()">Atualizar</span>
    </div>
    <div id="mission-list">
      <!-- Injetado via JS -->
    </div>
  </div>

  <!-- NOVA MISSÃO -->
  <div class="tab" id="new-mission-tab">
    <div class="section-title">➕ Nova Missão</div>
    <textarea id="missionInput" rows="10" placeholder="Descreva os objetivos para os agentes..."></textarea>
    <button class="btn-primary" onclick="app.submitMission()">Lançar Missão</button>
  </div>

  <!-- AGENTES -->
  <div class="tab" id="agents-tab">
    <div class="section-title">🤖 Agentes Online</div>
    <div id="agent-list">
      <!-- Injetado via JS -->
    </div>
  </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <button class="nav-item active" onclick="app.setTab('dashboard')">
    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
    Dashboard
  </button>
  <button class="nav-item" onclick="app.setTab('new-mission')">
    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    Nova
  </button>
  <button class="nav-item" onclick="app.setTab('agents')">
    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    Agentes
  </button>
</div>

<script>
  const API_BASE = 'https://sofia-api.meshwave.com.br/api/v1';

  const app = {
    state: {
      activeTab: 'dashboard',
      missions: [],
      agents: [],
      isLoading: false
    },

    async init() {
      await this.fetchData();
      this.render();
      setInterval(() => this.fetchData(), 30000);
    },

    setLoading(loading) {
      this.state.isLoading = loading;
      document.getElementById('loading').classList.toggle('active', loading);
    },

    async fetchData() {
      this.setLoading(true);
      try {
        const response = await fetch(`${API_BASE}/tasks/`);
        const data = await response.json();
        
        // Mapeia todas as tarefas para facilitar o acesso
        const allTasks = data;

        // Extrair agentes únicos das tarefas
        const agentMap = new Map();
        allTasks.forEach(t => {
          if (t.persona_id) {
            agentMap.set(t.persona_id, {
              id: t.persona_id,
              name: `Agente #${t.persona_id}`,
              status: 'Ativo',
              lastSeen: t.updated_at
            });
          }
        });
        this.state.agents = Array.from(agentMap.values());
        
        // Filtra missões mestres (parent_task_id null)
        this.state.missions = allTasks.filter(t => t.parent_task_id === null).map(t => {
          // Busca subtarefas vinculadas a esta missão
          const subtasks = allTasks.filter(st => st.parent_task_id === t.task_id);
          
          return {
            id: t.task_id,
            title: t.title || t.title_entry?.title || 'Missão #' + t.task_id,
            status: this.mapStatus(t.status_id),
            agent: t.persona_id ? `Agente #${t.persona_id}` : 'Sistema',
            time: this.formatTime(t.updated_at),
            detail: (t.blocks && t.blocks.length > 0) ? t.blocks[0].content : (t.description || 'Aguardando processamento...'),
            type: 'MISSÃO',
            subtaskCount: subtasks.length,
            subtasks: subtasks.map(st => ({
              id: st.task_id,
              title: st.title_entry?.title || 'Subtarefa',
              status: this.mapStatus(st.status_id)
            }))
          };
        });
      } catch (error) {
        console.error('API Error:', error);
      } finally {
        this.setLoading(false);
        this.render();
      }
    },

    mapStatus(statusId) {
      const map = {
        100: 'STAGED', 110: 'PROGRESS', 120: 'PAUSED', 130: 'DONE', 200: 'FAIL', 9: 'RESPONDIDA',
        1: 'STAGED', 2: 'PROGRESS', 3: 'DONE', 4: 'PAUSED', 5: 'FAIL'
      };
      return map[statusId] || 'UNKNOWN';
    },

    formatTime(dateStr) {
      if (!dateStr) return '---';
      const date = new Date(dateStr);
      const diff = Math.round((new Date() - date) / 60000);
      if (diff < 1) return 'agora';
      if (diff < 60) return `há ${diff} min`;
      return date.toLocaleDateString();
    },

    setTab(tabId) {
      this.state.activeTab = tabId;
      this.render();
    },

    render() {
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      document.getElementById(`${this.state.activeTab}-tab`).classList.add('active');

      document.querySelectorAll('.nav-item').forEach((el, idx) => {
        const tabs = ['dashboard', 'new-mission', 'agents'];
        el.classList.toggle('active', tabs[idx] === this.state.activeTab);
      });

      if (this.state.activeTab === 'dashboard') {
        const list = document.getElementById('mission-list');
        if (this.state.missions.length === 0) {
          list.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text-muted)">Nenhuma missão encontrada.</div>';
          return;
        }
        list.innerHTML = this.state.missions.map(m => `
          <div class="task-card">
            <div class="card-header">
              <div>
                <div style="font-size: 10px; color: var(--accent); font-weight: 700; margin-bottom: 4px;">${m.type}</div>
                <span class="card-title">#${m.id} - ${m.title}</span>
              </div>
              <span class="status-badge status-${m.status.toLowerCase()}">${m.status}</span>
            </div>
            <div class="card-meta">${m.agent} • ${m.time}</div>
            <div class="card-content">${m.detail.substring(0, 150)}${m.detail.length > 150 ? '...' : ''}</div>
            
            ${m.subtaskCount > 0 ? `
              <span class="subtask-indicator">📦 ${m.subtaskCount} subtarefa(s) vinculada(s)</span>
            ` : ''}

            <div style="margin-top: 15px; display: flex; gap: 8px; flex-wrap: wrap;">
               <button onclick="app.viewDetail(${m.id})" style="background: var(--border); color: #fff; border: none; padding: 10px; border-radius: 8px; font-size: 12px; flex: 1; min-width: 100px; cursor:pointer;">Ver Detalhes</button>
               <button onclick="app.changeStatus(${m.id}, '${m.status}')" style="background: var(--card); color: var(--accent); border: 1px solid var(--accent); padding: 10px; border-radius: 8px; font-size: 12px; flex: 1; min-width: 100px; cursor:pointer;">Mudar Status</button>
               <button onclick="app.intervene(${m.id})" style="background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 8px; font-size: 12px; width: 100%; font-weight: 600; cursor:pointer; margin-top: 4px;">Intervir</button>
            </div>
          </div>
        `).join('');
      } else if (this.state.activeTab === 'agents') {
        const list = document.getElementById('agent-list');
        if (this.state.agents.length === 0) {
          list.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text-muted)">Nenhum agente detectado no sistema.</div>';
          return;
        }
        list.innerHTML = this.state.agents.map(a => `
          <div class="agent-item">
            <div class="agent-avatar">${a.id}</div>
            <div style="flex: 1;">
              <div style="font-weight: 600;">${a.name}</div>
              <div style="font-size: 12px; color: var(--text-muted);">Visto pela última vez: ${this.formatTime(a.lastSeen)}</div>
            </div>
            <div style="font-size: 10px; color: var(--success); font-weight: 700;">● ${a.status}</div>
          </div>
        `).join('');
      }
    },

    async submitMission() {
      const val = document.getElementById('missionInput').value.trim();
      if (!val) return alert('Descreva a missão.');
      
      this.setLoading(true);
      try {
        // 1. Criar a Task conforme o Schema TaskCreate (espera apenas description e client_request_uuid opcional)
        // O status_id é definido automaticamente como PENDING_STATUS_ID (1) no service
        const res = await fetch(`${API_BASE}/tasks/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            description: val 
          })
        });
        
        if (!res.ok) {
          const errText = await res.text();
          console.error('API Error Response:', errText);
          let errMsg = 'Erro na API (' + res.status + ')';
          try {
            const errData = JSON.parse(errText);
            errMsg = errData.detail || errMsg;
          } catch(e) {}
          throw new Error(errMsg);
        }
        const task = await res.json();
        console.log('Task created:', task);
        
        // Pequeno delay para garantir que a task foi persistida antes das sub-chamadas
        await new Promise(r => setTimeout(r, 500));

        // 2. Definir o Título (opcional mas recomendado para missões)
        try {
          const titleRes = await fetch(`${API_BASE}/tasks/${task.task_id}/title`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: val.split('\n')[0].substring(0, 50) })
          });
          console.log('Title response status:', titleRes.status);
        } catch (e) {
          console.warn('Erro ao definir título, mas a tarefa foi criada:', e);
        }
        
        // 3. Atualizar o Status para 100 (STAGED) se for uma Missão
        // Isso separa as missões das tarefas comuns (status 1)
        try {
          const patchRes = await fetch(`${API_BASE}/tasks/${task.task_id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status_id: 100 })
          });
          console.log('Status update response status:', patchRes.status);
        } catch (e) {
          console.warn('Erro ao atualizar status para STAGED:', e);
        }

        alert('Missão lançada com sucesso no Banco de Dados! ID: ' + task.task_id);
        document.getElementById('missionInput').value = '';
        await this.fetchData();
        this.setTab('dashboard');
      } catch (e) {
        console.error('Submit Mission Error:', e);
        alert('Erro ao lançar missão: ' + e.message);
      } finally {
        this.setLoading(false);
      }
    },

    async viewDetail(id) {
      this.setLoading(true);
      try {
        const res = await fetch(`${API_BASE}/tasks/${id}`);
        const task = await res.json();
        
        const blocksRes = await fetch(`${API_BASE}/tasks/${id}/blocks`);
        const blocks = await blocksRes.json();
        
        const historyText = blocks.map(b => `[${b.author_id}]: ${b.content}`).join('\n\n');
        
        // Exibir subtarefas se houver
        const subtasksText = task.children && task.children.length > 0 
          ? '\n\nSubtarefas:\n' + task.children.map(c => `- #${c.task_id}: ${this.mapStatus(c.status_id)}`).join('\n')
          : '';

        alert(`Detalhes da Missão #${id} (${this.mapStatus(task.status_id)})\n\n${historyText}${subtasksText}`);
      } catch (e) {
        alert('Erro ao carregar detalhes.');
      } finally {
        this.setLoading(false);
      }
    },

    async intervene(id) {
      const msg = prompt("Digite sua instrução para intervir nesta missão:");
      if (!msg) return;
      
      this.setLoading(true);
      try {
        await fetch(`${API_BASE}/tasks/${id}/blocks`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            sequence: 999, // Será ajustado pelo backend
            author_id: 'User-Intervention', 
            block_type: 'Instruction', 
            content: msg 
          })
        });
        alert("Intervenção registrada no banco de dados!");
        await this.fetchData();
      } catch (e) {
        alert("Erro ao enviar intervenção.");
      } finally {
        this.setLoading(false);
      }
    },

    async changeStatus(id, currentStatus) {
      const statusOptions = {
        'STAGED': 100,
        'PROGRESS': 110,
        'PAUSED': 120,
        'DONE': 130,
        'FAIL': 200,
        'RESPONDIDA': 9
      };
      
      const optionsText = Object.keys(statusOptions).join(', ');
      const newStatusName = prompt(`Status atual: ${currentStatus}\nEscolha o novo status (${optionsText}):`);
      
      if (!newStatusName) return;
      
      const newStatusId = statusOptions[newStatusName.toUpperCase()];
      
      if (newStatusId === undefined) {
        alert('Status inválido. Use um dos seguintes: ' + optionsText);
        return;
      }
      
      this.setLoading(true);
      try {
        const res = await fetch(`${API_BASE}/tasks/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status_id: newStatusId })
        });
        
        if (!res.ok) throw new Error('Erro na API');
        
        alert(`Status da missão #${id} alterado para ${newStatusName.toUpperCase()}`);
        await this.fetchData();
      } catch (e) {
        alert('Erro ao alterar status.');
      } finally {
        this.setLoading(false);
      }
    }
  };

  app.init();
</script>
</body>
</html>
